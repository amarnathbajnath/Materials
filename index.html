<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Costing Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <h1 style="font-size:1.75rem;font-weight:800;color:#f1f5f9;letter-spacing:-0.01em;">&#9889; Job Costing Dashboard</h1>
      <p class="subtitle">Risha Vishal Electrical &amp; Construction Co. Ltd.</p>
    </div>
    <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">
      <p id="status" style="color:#94a3b8;">&#8987; Loading materials...</p>
      <button onclick="loadMaterials()" class="btn-outline" style="font-size:0.75rem;padding:0.35rem 0.85rem;">&#8635; Refresh</button>
    </div>
  </div>

  <!-- JOB TOOLBAR -->
  <div class="job-toolbar">
    <button onclick="newJob()" class="btn-outline" style="display:flex;align-items:center;gap:0.4rem;">
      &#xFF0B; New Job
    </button>
    <button onclick="saveJobJSON()" class="btn-outline" style="display:flex;align-items:center;gap:0.4rem;">
      &#11015; Save Job
    </button>
    <label class="btn-outline" style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
      &#11014; Load Job
      <input id="loadJobInput" type="file" accept=".json" onchange="loadJobJSON(event)" style="display:none;">
    </label>
  </div>

  <!-- JOB DETAILS -->
  <div class="panel" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.25rem;">
    <div>
      <label class="field-label">Customer Name</label>
      <input id="customer" type="text" class="field-input" placeholder="John Smith">
    </div>
    <div>
      <label class="field-label">Address</label>
      <input id="address" type="text" class="field-input" placeholder="123 Main Road, Chaguanas">
    </div>
    <div>
      <label class="field-label">Date</label>
      <input id="date" type="date" class="field-input">
    </div>
    <div>
      <label class="field-label">Quote No.</label>
      <input id="quoteNo" type="text" class="field-input" placeholder="e.g. Q-2026-001">
    </div>
  </div>

  <!-- JOB SECTIONS -->
  <div id="jobSections"></div>

  <!-- ADD SECTION BUTTON -->
  <div style="margin-bottom:2rem;text-align:center;">
    <button onclick="addNewSection()" class="btn-primary" style="padding:0.65rem 2rem;">+ Add New Section</button>
  </div>

  <!-- NOTES -->
  <div class="panel">
    <h2 class="title-white" style="font-size:1rem;margin-bottom:0.75rem;">NOTES</h2>
    <textarea id="notes" rows="4" class="field-input scope-textarea" placeholder="Additional notes for this job..."></textarea>
  </div>

  <!-- EXPORT BUTTONS -->
  <div class="summary-bar">
    <button onclick="generatePDF()" class="btn-primary" style="flex:1;padding:0.85rem;font-size:1rem;">Share PDF &#128228;</button>
    <button onclick="exportCSV()" class="btn-secondary" style="flex:1;padding:0.85rem;font-size:1rem;">Share CSV &#128202;</button>
  </div>

  <!-- SUMMARY BAR -->
  <div class="summary-bar-2">
    <div class="sum-item">
      <div class="sum-label">Subtotal</div>
      <div class="sum-value" id="bar-sub">$0.00</div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-pct">
      <div class="pct-row">
        <label>Markup %</label>
        <input type="number" id="pct-markup" value="27.5" min="0" max="999" step="0.1" oninput="validatePct(this); recalcSummary()">%
      </div>
      <div class="pct-row">
        <label>VAT %</label>
        <input type="number" id="pct-vat" value="12.5" min="0" max="100" step="0.1" oninput="validatePct(this); recalcSummary()">%
      </div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-item">
      <div class="sum-label">Markup</div>
      <div class="sum-value" id="bar-markup">$0.00</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">VAT (on cost+markup)</div>
      <div class="sum-value" id="bar-vat">$0.00</div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-item">
      <div class="sum-label">Total Quoted</div>
      <div class="sum-value total" id="bar-total">$0.00</div>
    </div>
  </div>

</div><!-- end app-container -->

<!-- ADD ITEM MODAL -->
<div id="addModal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event,'addModal')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3 class="modal-title">Add Unlisted Item</h3>
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label class="modal-label">Item Name <span style="color:#f87171">*</span></label>
        <input id="modalItemName" type="text" class="field-input" placeholder="e.g. Custom conduit fitting" onkeydown="if(event.key==='Enter') confirmAddModal()">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div>
          <label class="modal-label">Quantity</label>
          <input id="modalQty" type="number" min="0" step="any" class="field-input" onkeydown="if(event.key==='Enter') confirmAddModal()">
        </div>
        <div>
          <label class="modal-label">Unit Price (TTD)</label>
          <input id="modalUnitPrice" type="number" value="0.00" min="0" step="0.01" class="field-input" onkeydown="if(event.key==='Enter') confirmAddModal()">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div>
          <label class="modal-label">SKU (auto)</label>
          <div id="modalSkuPreview" class="modal-badge" style="font-family:monospace;">TMP-001</div>
        </div>
        <div>
          <label class="modal-label">Unit (auto)</label>
          <div class="modal-badge">each</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button onclick="closeAddModal()" class="btn-outline" style="flex:1;padding:0.75rem;">Cancel</button>
      <button onclick="confirmAddModal()" class="btn-primary" style="flex:1;padding:0.75rem;">Add Item</button>
    </div>
  </div>
</div>

<!-- QTY MODAL -->
<div id="qtyModal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event,'qtyModal')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3 class="modal-title" id="qtyModalTitle">Add Item</h3>
    <p id="qtyModalSku" class="modal-meta"></p>
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label class="modal-label">Quantity</label>
        <input id="qtyModalQty" type="number" value="1" min="0" step="any" class="field-input" onkeydown="if(event.key==='Enter') confirmQtyModal()">
      </div>
      <div>
        <label class="modal-label">Unit</label>
        <div id="qtyModalUnit" class="modal-badge"></div>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button onclick="closeQtyModal()" class="btn-outline" style="flex:1;padding:0.75rem;">Cancel</button>
      <button onclick="confirmQtyModal()" class="btn-primary" style="flex:1;padding:0.75rem;">Add to List</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQF-dVNCimVYFht-LgwEeKT4rEtW-IDphibc5oSV60YBjLxGn4KGT45nU2U58EfBCYbF0UdDxdoe88r/pub?gid=0&single=true&output=csv";
const COMPANY = "Risha Vishal Electrical & Construction Co. Ltd.";

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let allMaterials = [];
let jobs = [];
let currentSuggestions = [];
let selectedSuggestionIndex = -1;
let currentJobIndex = 0;
let pendingItem = null;
let tmpSkuCounter = 0;  // monotonic — never resets, so TMP SKUs never collide

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.onload = () => {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  addNewSection();
  loadMaterials();
  recalcSummary();
};

// ─────────────────────────────────────────────
//  MATERIALS LOAD
// ─────────────────────────────────────────────
async function loadMaterials() {
  const status = document.getElementById('status');
  status.textContent = 'Loading materials...';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    if (!parsed.length) throw new Error('Sheet appears empty');
    allMaterials = parsed;
    status.textContent = '✅ ' + allMaterials.length + ' items loaded';
  } catch (err) {
    status.innerHTML = '❌ Load failed — <span style="color:#6b7280;font-size:0.75rem">' + err.message + '</span>';
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  return lines.slice(1).map(line => {
    const values = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        values.push(current.trim()); current = '';
      } else { current += ch; }
    }
    values.push(current.trim());
    const rawPrice = values[3] ? values[3].trim().replace(/[$,TTD ]/g, '') : '';
    const price = rawPrice !== '' && !isNaN(parseFloat(rawPrice)) ? parseFloat(rawPrice) : null;
    return { SKU: values[0]||'', Item: values[1]||'', Unit: values[2]||'', Price: price };
  }).filter(m => m.Item);
}

// ─────────────────────────────────────────────
//  SECTION MANAGEMENT
// ─────────────────────────────────────────────
function addNewSection() {
  const idx = jobs.length;
  jobs.push({ scope: '', addedItems: [], tmpItems: [] });
  const container = document.getElementById('jobSections');
  const el = document.createElement('div');
  el.id = 'job-section-' + idx;
  el.className = 'job-section';
  el.dataset.jobIndex = idx;
  el.innerHTML = buildSectionHTML(idx);
  container.appendChild(el);
  setTimeout(() => { const inp = document.getElementById('searchOther-' + idx); if (inp) inp.focus(); }, 50);
}

function buildSectionHTML(idx) {
  const label = jobs.length > 1 ? '<span class="section-chip">Section ' + (idx+1) + '</span>' : '';
  const removeBtn = jobs.length > 1
    ? '<button onclick="removeSection(' + idx + ')" class="btn-outline" style="color:#f87171;border-color:#f87171;padding:0.3rem 0.75rem;font-size:0.75rem;">✕ Remove</button>'
    : '';
  return `
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
        <div>${label}<label class="title-white" style="display:block;font-size:1rem;">SCOPE</label></div>
        ${removeBtn}
      </div>
      <textarea id="scope-${idx}" class="field-input scope-textarea"
        placeholder="Describe the scope of this job..."
        oninput="jobs[${idx}].scope=this.value">${jobs[idx].scope}</textarea>
    </div>

    <div class="table-panel">
      <div style="padding:1.25rem 1.25rem 0;">
        <h2 class="title-white" style="font-size:1rem;margin-bottom:0.75rem;">MATERIAL LIST</h2>
        <div style="position:relative;padding-bottom:1rem;border-bottom:1px solid #2d3148;">
          <input id="searchOther-${idx}" type="text" placeholder="Search by item name or SKU..."
            class="field-input" oninput="filterOther(${idx})"
            onkeydown="handleSearchKey(event,${idx})" autocomplete="off">
          <ul id="suggestionList-${idx}" class="suggestion-list hidden"></ul>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead class="table-header"><tr>
            <th style="text-align:left;width:7rem;">SKU</th>
            <th style="text-align:center;width:6rem;">QTY</th>
            <th style="text-align:left;width:5rem;">UNIT</th>
            <th style="text-align:left;">ITEM</th>
            <th style="text-align:right;width:6rem;">UNIT $</th>
            <th style="text-align:right;width:7rem;">TOTAL</th>
            <th style="text-align:center;width:4rem;">✕</th>
          </tr></thead>
          <tbody id="materialListBody-${idx}">
            <tr><td colspan="7" style="padding:2rem;text-align:center;color:#475569;font-style:italic;">No items added yet. Search and add materials above.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="table-panel">
      <div style="padding:1rem 1.25rem;border-bottom:1px solid #2d3148;display:flex;align-items:center;justify-content:space-between;">
        <h2 class="title-white" style="font-size:1rem;">ITEMS NOT LISTED</h2>
        <button onclick="openAddModal(${idx})" class="btn-primary" style="padding:0.5rem 1rem;">+ Add Item</button>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead class="table-header"><tr>
            <th style="text-align:left;width:7rem;">SKU</th>
            <th style="text-align:center;width:6rem;">QTY</th>
            <th style="text-align:left;width:5rem;">UNIT</th>
            <th style="text-align:left;">ITEM</th>
            <th style="text-align:right;width:6rem;">UNIT $</th>
            <th style="text-align:right;width:7rem;">TOTAL</th>
            <th style="text-align:center;width:4rem;">✕</th>
          </tr></thead>
          <tbody id="tmpListBody-${idx}">
            <tr><td colspan="7" style="padding:2rem;text-align:center;color:#475569;font-style:italic;">No unlisted items added yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function removeSection(jobIndex) {
  if (jobs.length <= 1) return;
  saveAllScopes();
  jobs.splice(jobIndex, 1);
  reRenderAllSections();
  currentJobIndex = Math.min(currentJobIndex, jobs.length - 1);
}

function saveAllScopes() {
  jobs.forEach((job, i) => { const el = document.getElementById('scope-' + i); if (el) job.scope = el.value; });
}

function reRenderAllSections() {
  saveAllScopes();
  const container = document.getElementById('jobSections');
  container.innerHTML = '';
  jobs.forEach((_, i) => {
    const el = document.createElement('div');
    el.id = 'job-section-' + i;
    el.className = 'job-section';
    el.dataset.jobIndex = i;
    el.innerHTML = buildSectionHTML(i);
    container.appendChild(el);
    renderMaterialList(i);
    renderTmpList(i);
  });
}

// ─────────────────────────────────────────────
//  SEARCH / SUGGESTIONS
// ─────────────────────────────────────────────
function filterOther(jobIndex) {
  currentJobIndex = jobIndex;
  const searchInput = document.getElementById('searchOther-' + jobIndex);
  const list = document.getElementById('suggestionList-' + jobIndex);
  selectedSuggestionIndex = -1;
  if (!searchInput || !list) { hideSuggestions(); return; }
  const term = searchInput.value.toLowerCase().trim();
  if (!term) { hideSuggestions(); return; }
  currentSuggestions = allMaterials
    .filter(m => m.Item.toLowerCase().includes(term) || m.SKU.toLowerCase().includes(term))
    .slice(0, 15);
  if (!currentSuggestions.length) { hideSuggestions(); return; }
  list.innerHTML = currentSuggestions.map((m, i) =>
    '<li id="sug-' + jobIndex + '-' + i + '" onmousedown="event.preventDefault()" onclick="selectSuggestion(' + i + ',' + jobIndex + ')">' +
    '<span style="font-family:monospace;font-size:0.65rem;color:#475569;width:5rem;flex-shrink:0;">' + m.SKU + '</span>' +
    '<span style="flex:1;font-weight:500;color:#e2e8f0;">' + m.Item + '</span>' +
    '<span style="font-size:0.7rem;color:#64748b;flex-shrink:0;">' + m.Unit + '</span></li>'
  ).join('');
  list.classList.remove('hidden');
}

function hideSuggestions() {
  document.querySelectorAll('[id^="suggestionList-"]').forEach(el => el.classList.add('hidden'));
  currentSuggestions = []; selectedSuggestionIndex = -1;
}

function highlightSuggestion() {
  const list = document.getElementById('suggestionList-' + currentJobIndex);
  if (!list) return;
  Array.from(list.querySelectorAll('li')).forEach((li, i) => li.classList.toggle('active', i === selectedSuggestionIndex));
  const active = document.getElementById('sug-' + currentJobIndex + '-' + selectedSuggestionIndex);
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function handleSearchKey(e, jobIndex) {
  currentJobIndex = jobIndex;
  const list = document.getElementById('suggestionList-' + jobIndex);
  const open = list && !list.classList.contains('hidden');
  if (e.key === 'ArrowDown') { e.preventDefault(); if (!open) return; selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, currentSuggestions.length - 1); highlightSuggestion(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (!open) return; selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, -1); highlightSuggestion(); }
  else if (e.key === 'Enter') { e.preventDefault(); if (open && selectedSuggestionIndex >= 0) selectSuggestion(selectedSuggestionIndex, jobIndex); else addSearchedItem(jobIndex); }
  else if (e.key === 'Escape') { hideSuggestions(); }
}

function selectSuggestion(index, jobIndex) {
  currentJobIndex = jobIndex;
  const m = currentSuggestions[index];
  if (!m) return;
  hideSuggestions();
  const input = document.getElementById('searchOther-' + jobIndex);
  if (input) input.value = '';
  openQtyModal(m);
}

function addSearchedItem(jobIndex) {
  currentJobIndex = jobIndex;
  if (currentSuggestions.length > 0) { selectSuggestion(selectedSuggestionIndex >= 0 ? selectedSuggestionIndex : 0, jobIndex); return; }
  const input = document.getElementById('searchOther-' + jobIndex);
  if (!input) return;
  const term = input.value.trim();
  if (!term) return;
  const m = allMaterials.find(x => x.Item.toLowerCase() === term.toLowerCase())
         || allMaterials.find(x => x.Item.toLowerCase().includes(term.toLowerCase()));
  if (m) openQtyModal(m); else addItemToList('—', term, '—', 1, null, jobIndex);
  input.value = ''; hideSuggestions();
}

// ─────────────────────────────────────────────
//  QTY MODAL
// ─────────────────────────────────────────────
function openQtyModal(m) {
  pendingItem = m;
  document.getElementById('qtyModalTitle').textContent = m.Item;
  document.getElementById('qtyModalSku').textContent   = m.SKU;
  document.getElementById('qtyModalUnit').textContent  = m.Unit;
  document.getElementById('qtyModalQty').value = '1';
  document.getElementById('qtyModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('qtyModalQty').select(), 50);
}
function closeQtyModal() { document.getElementById('qtyModal').classList.add('hidden'); pendingItem = null; }
function confirmQtyModal() {
  if (!pendingItem) return;
  addItemToList(pendingItem.SKU, pendingItem.Item, pendingItem.Unit, parseFloat(document.getElementById('qtyModalQty').value) || 1, pendingItem.Price, currentJobIndex);
  closeQtyModal();
}

// ─────────────────────────────────────────────
//  MATERIAL LIST
// ─────────────────────────────────────────────
function addItemToList(sku, itemName, unit, qty, price, jobIndex) {
  jobIndex = jobIndex ?? currentJobIndex;
  const job = jobs[jobIndex]; if (!job) return;
  qty = qty || 1; price = price !== undefined ? price : null;
  const existing = job.addedItems.find(i => sku !== '—' ? i.SKU === sku : i.Item.toLowerCase() === itemName.toLowerCase());
  if (existing) { existing.Qty += qty; renderMaterialList(jobIndex); focusSearch(jobIndex); return; }
  job.addedItems.push({ SKU: sku, Item: itemName, Unit: unit, Qty: qty, Price: price });
  renderMaterialList(jobIndex); focusSearch(jobIndex);
}

function focusSearch(jobIndex) { const input = document.getElementById('searchOther-' + jobIndex); if (input) input.focus(); }
function removeItem(jobIndex, index) { const job = jobs[jobIndex]; if (!job) return; job.addedItems.splice(index,1); renderMaterialList(jobIndex); focusSearch(jobIndex); }
function updateQty(jobIndex, index, value) { const job = jobs[jobIndex]; if (!job) return; job.addedItems[index].Qty = parseFloat(value)||0; recalcSummary(); }

function renderMaterialList(jobIndex) {
  const job = jobs[jobIndex];
  const tbody = document.getElementById('materialListBody-' + jobIndex);
  if (!tbody) return;
  if (!job.addedItems.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:2rem;text-align:center;color:#475569;font-style:italic;">No items added yet. Search and add materials above.</td></tr>';
    recalcSummary(); return;
  }
  tbody.innerHTML = '';
  job.addedItems.forEach((item, i) => {
    const up = item.Price !== null && item.Price !== undefined ? item.Price : null;
    const tp = up !== null ? (item.Qty * up).toFixed(2) : 'N/A';
    const row = document.createElement('tr');
    row.innerHTML =
      '<td style="padding:0.75rem 1rem;font-family:monospace;font-size:0.7rem;color:#475569;">' + item.SKU + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:center;"><input type="number" value="' + item.Qty + '" min="0" step="any" style="width:4.5rem;text-align:center;" class="field-input" onchange="updateQty(' + jobIndex + ',' + i + ',this.value)"></td>' +
      '<td style="padding:0.75rem 1rem;color:#64748b;font-size:0.8rem;">' + item.Unit + '</td>' +
      '<td style="padding:0.75rem 1rem;font-weight:500;color:#e2e8f0;">' + item.Item + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:right;color:#94a3b8;font-size:0.85rem;">' + (up !== null ? '$' + up.toFixed(2) : 'N/A') + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:right;font-weight:600;color:#34d399;">' + (tp !== 'N/A' ? '$' + tp : 'N/A') + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:center;"><button onclick="removeItem(' + jobIndex + ',' + i + ')" style="color:#f87171;font-weight:700;font-size:1.1rem;background:none;border:none;cursor:pointer;" title="Remove">&#x2715;</button></td>';
    tbody.appendChild(row);
  });
  recalcSummary();
}

// ─────────────────────────────────────────────
//  UNLISTED ITEMS
// ─────────────────────────────────────────────
function nextTmpSku() { tmpSkuCounter++; return 'TMP-' + String(tmpSkuCounter).padStart(3,'0'); }

function openAddModal(jobIndex) {
  currentJobIndex = jobIndex;
  document.getElementById('modalItemName').value = '';
  document.getElementById('modalQty').value = '';
  document.getElementById('modalUnitPrice').value = '0.00';
  document.getElementById('modalSkuPreview').textContent = 'TMP-' + String(tmpSkuCounter+1).padStart(3,'0');
  document.getElementById('addModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('modalItemName').focus(), 50);
}
function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); document.getElementById('modalItemName').classList.remove('input-error'); }
function confirmAddModal() {
  const name = document.getElementById('modalItemName').value.trim();
  if (!name) { document.getElementById('modalItemName').classList.add('input-error'); document.getElementById('modalItemName').focus(); return; }
  document.getElementById('modalItemName').classList.remove('input-error');
  jobs[currentJobIndex].tmpItems.push({ SKU: nextTmpSku(), Item: name, Unit: 'each', Qty: parseFloat(document.getElementById('modalQty').value)||0, Price: parseFloat(document.getElementById('modalUnitPrice').value)||0 });
  renderTmpList(currentJobIndex); closeAddModal();
}

function removeTmpItem(jobIndex, index) { const job = jobs[jobIndex]; if (!job) return; job.tmpItems.splice(index,1); renderTmpList(jobIndex); }
function updateTmpQty(jobIndex, index, value) { const job = jobs[jobIndex]; if (!job) return; job.tmpItems[index].Qty = parseFloat(value)||0; recalcSummary(); }
function updateTmpPrice(jobIndex, index, value) { const job = jobs[jobIndex]; if (!job) return; job.tmpItems[index].Price = parseFloat(value)||0; recalcSummary(); }

function renderTmpList(jobIndex) {
  const job = jobs[jobIndex];
  const tbody = document.getElementById('tmpListBody-' + jobIndex);
  if (!tbody) return;
  if (!job.tmpItems.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:2rem;text-align:center;color:#475569;font-style:italic;">No unlisted items added yet.</td></tr>';
    recalcSummary(); return;
  }
  tbody.innerHTML = '';
  job.tmpItems.forEach((item, i) => {
    const tp = (item.Qty * (item.Price||0)).toFixed(2);
    const row = document.createElement('tr');
    row.innerHTML =
      '<td style="padding:0.75rem 1rem;font-family:monospace;font-size:0.7rem;color:#a5b4fc;">' + item.SKU + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:center;"><input type="number" value="' + item.Qty + '" min="0" step="any" style="width:4.5rem;text-align:center;" class="field-input" onchange="updateTmpQty(' + jobIndex + ',' + i + ',this.value)"></td>' +
      '<td style="padding:0.75rem 1rem;color:#64748b;font-size:0.8rem;">' + item.Unit + '</td>' +
      '<td style="padding:0.75rem 1rem;font-weight:500;color:#e2e8f0;">' + item.Item + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:right;"><input type="number" value="' + item.Price.toFixed(2) + '" min="0" step="0.01" style="width:5.5rem;text-align:right;" class="field-input" onchange="updateTmpPrice(' + jobIndex + ',' + i + ',this.value)" title="Edit unit price"></td>' +
      '<td style="padding:0.75rem 1rem;text-align:right;font-weight:600;color:#34d399;">$' + tp + '</td>' +
      '<td style="padding:0.75rem 1rem;text-align:center;"><button onclick="removeTmpItem(' + jobIndex + ',' + i + ')" style="color:#f87171;font-weight:700;font-size:1.1rem;background:none;border:none;cursor:pointer;" title="Remove">&#x2715;</button></td>';
    tbody.appendChild(row);
  });
  recalcSummary();
}

// ─────────────────────────────────────────────
//  SUMMARY RECALC
// ─────────────────────────────────────────────
function validatePct(input) { const v = parseFloat(input.value); if (isNaN(v)||v<0) input.value=0; if (v>999) input.value=999; }

function recalcSummary() {
  let subtotal = 0, hasNA = false;
  jobs.forEach(job => {
    job.addedItems.forEach(item => { if (item.Price!==null&&item.Price!==undefined) subtotal+=item.Qty*item.Price; else hasNA=true; });
    job.tmpItems.forEach(item   => { if (item.Price!==null&&item.Price!==undefined) subtotal+=item.Qty*item.Price; else hasNA=true; });
  });
  const markupPct = Math.max(0, parseFloat(document.getElementById('pct-markup').value)||0);
  const vatPct    = Math.max(0, parseFloat(document.getElementById('pct-vat').value)   ||0);
  const markup = subtotal * (markupPct/100);
  const vat    = (subtotal+markup) * (vatPct/100);
  const total  = subtotal+markup+vat;
  const na = hasNA ? ' + N/A' : '';
  document.getElementById('bar-sub').textContent    = '$' + subtotal.toFixed(2) + na;
  document.getElementById('bar-markup').textContent = '$' + markup.toFixed(2);
  document.getElementById('bar-vat').textContent    = '$' + vat.toFixed(2);
  document.getElementById('bar-total').textContent  = '$' + total.toFixed(2) + na;
}

// ─────────────────────────────────────────────
//  SERIALISE / DESERIALISE
// ─────────────────────────────────────────────
function collectState() {
  saveAllScopes();
  return {
    version:      1,
    savedAt:      new Date().toISOString(),
    customer:     document.getElementById('customer').value,
    address:      document.getElementById('address').value,
    date:         document.getElementById('date').value,
    quoteNo:      document.getElementById('quoteNo').value,
    notes:        document.getElementById('notes').value,
    markupPct:    document.getElementById('pct-markup').value,
    vatPct:       document.getElementById('pct-vat').value,
    tmpSkuCounter,
    jobs: jobs.map(j => ({ scope: j.scope, addedItems: j.addedItems, tmpItems: j.tmpItems }))
  };
}

function applyState(state) {
  document.getElementById('customer').value   = state.customer  || '';
  document.getElementById('address').value    = state.address   || '';
  document.getElementById('date').value       = state.date      || new Date().toISOString().split('T')[0];
  document.getElementById('quoteNo').value    = state.quoteNo   || '';
  document.getElementById('notes').value      = state.notes     || '';
  document.getElementById('pct-markup').value = state.markupPct ?? 27.5;
  document.getElementById('pct-vat').value    = state.vatPct    ?? 12.5;
  tmpSkuCounter = state.tmpSkuCounter || 0;
  jobs = (state.jobs||[]).map(j => ({ scope: j.scope||'', addedItems: j.addedItems||[], tmpItems: j.tmpItems||[] }));
  if (!jobs.length) jobs = [{ scope:'', addedItems:[], tmpItems:[] }];
  reRenderAllSections();
  recalcSummary();
}

// ─────────────────────────────────────────────
//  NEW JOB
// ─────────────────────────────────────────────
function newJob() {
  if (!confirm('Start a new job? This will clear everything.\n\nSave the current job first if you need to keep it.')) return;
  jobs = []; tmpSkuCounter = 0;
  document.getElementById('jobSections').innerHTML = '';
  ['customer','address','quoteNo','notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('date').value        = new Date().toISOString().split('T')[0];
  document.getElementById('pct-markup').value  = 27.5;
  document.getElementById('pct-vat').value     = 12.5;
  addNewSection(); recalcSummary();
  showToast('New job started');
}

// ─────────────────────────────────────────────
//  SAVE JOB  — downloads .json file
// ─────────────────────────────────────────────
function saveJobJSON() {
  const state    = collectState();
  const blob     = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json;charset=utf-8;' });
  const customer = (state.customer||'Job').replace(/[^a-zA-Z0-9]/g,'_');
  const date     = state.date || new Date().toISOString().split('T')[0];
  const filename = 'Job_' + customer + '_' + date + '.json';
  const file     = new File([blob], filename, { type: 'application/json' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'Job File' }).catch(() => downloadBlob(blob, filename));
  } else {
    downloadBlob(blob, filename);
  }
  showToast('Saved — ' + filename);
}

// ─────────────────────────────────────────────
//  LOAD JOB  — reads .json file
// ─────────────────────────────────────────────
function loadJobJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';  // allow re-loading the same file
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      if (!state.jobs || !Array.isArray(state.jobs)) throw new Error('Invalid job file.');
      jobs = []; document.getElementById('jobSections').innerHTML = '';
      applyState(state);
      showToast('Loaded — ' + (state.customer || file.name));
    } catch (err) { showToast('Failed to load: ' + err.message); }
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────
//  PDF EXPORT
// ─────────────────────────────────────────────
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const PAGE_W=210, PAGE_H=297, ML=15, MR=15, MT=15, MB=20;
  const contentW = PAGE_W - ML - MR;
  let y = MT, pageNum = 1;

  const customer  = document.getElementById('customer').value  || 'Customer';
  const address   = document.getElementById('address').value   || '';
  const dateRaw   = document.getElementById('date').value      || new Date().toISOString().split('T')[0];
  const quoteNo   = document.getElementById('quoteNo').value   || '';
  const notes     = document.getElementById('notes').value     || '';
  const markupPct = parseFloat(document.getElementById('pct-markup').value) || 0;
  const vatPct    = parseFloat(document.getElementById('pct-vat').value)    || 0;
  const dateFmt   = dateRaw ? new Date(dateRaw + 'T00:00:00').toLocaleDateString('en-TT', { year:'numeric', month:'long', day:'numeric' }) : '';

  function addPage() { drawPageNumber(); doc.addPage(); pageNum++; y=MT; drawRunningHeader(); }
  function checkY(n) { if (y+n > PAGE_H-MB) addPage(); }
  function drawPageNumber() {
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text('Page ' + pageNum, PAGE_W/2, PAGE_H-8, { align:'center' });
    doc.text(COMPANY, ML, PAGE_H-8);
    if (quoteNo) doc.text(quoteNo, PAGE_W-MR, PAGE_H-8, { align:'right' });
  }
  function drawRunningHeader() {
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(100,100,100);
    doc.text(COMPANY + (quoteNo ? '  |  ' + quoteNo : ''), ML, y);
    y+=5; doc.setDrawColor(220,220,220); doc.setLineWidth(0.3); doc.line(ML,y,PAGE_W-MR,y); y+=5;
  }
  function hline(c) { doc.setDrawColor(...(c||[220,220,220])); doc.setLineWidth(0.3); doc.line(ML,y,PAGE_W-MR,y); }
  function tableHeader() {
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(100,100,100);
    doc.text('SKU',ML,y); doc.text('QTY',ML+28,y); doc.text('UNIT',ML+40,y); doc.text('DESCRIPTION',ML+60,y);
    doc.text('UNIT $',ML+150,y,{align:'right'}); doc.text('TOTAL TTD',PAGE_W-MR,y,{align:'right'});
    y+=3; hline([180,180,180]); y+=4; doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30);
  }
  function tableRow(item) {
    checkY(8); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.setTextColor(120,120,120); doc.text(String(item.SKU).substring(0,12),ML,y);
    doc.setTextColor(30,30,30); doc.text(String(item.Qty),ML+28,y); doc.text(String(item.Unit).substring(0,8),ML+40,y);
    const nl = doc.splitTextToSize(item.Item, 65); doc.text(nl,ML+60,y);
    const up = item.Price!==null&&item.Price!==undefined ? item.Price : null;
    const lt = up!==null ? (up*item.Qty).toFixed(2) : 'N/A';
    doc.setTextColor(60,60,60); doc.text(up!==null ? '$'+up.toFixed(2) : 'N/A', ML+150, y, {align:'right'});
    doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
    doc.text(lt!=='N/A' ? '$'+lt : 'N/A', PAGE_W-MR, y, {align:'right'});
    doc.setFont('helvetica','normal');
    y += nl.length>1 ? nl.length*5 : 7; hline([240,240,240]); y+=2;
    return up!==null ? up*item.Qty : null;
  }
  function secSubtotal(total, hasNA) {
    checkY(10); doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
    doc.text('Section Subtotal:',ML+90,y); doc.setTextColor(20,20,20);
    doc.text('$'+total.toFixed(2)+(hasNA?' + N/A':''),PAGE_W-MR,y,{align:'right'});
    doc.setFont('helvetica','normal'); y+=8;
  }

  // Header band
  doc.setFillColor(20,24,40); doc.rect(0,0,PAGE_W,38,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(255,255,255); doc.text(COMPANY,ML,14);
  doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(160,175,210); doc.text('Material Cost Sheet',ML,21);
  if (quoteNo) { doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(180,200,255); doc.text('Quote No: '+quoteNo,PAGE_W-MR,14,{align:'right'}); }
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(180,200,255); doc.text('Date: '+dateFmt,PAGE_W-MR,21,{align:'right'});
  y=45;

  // Client info
  doc.setFillColor(240,242,248); doc.roundedRect(ML,y,contentW,18,2,2,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(80,80,80);
  doc.text('CUSTOMER',ML+4,y+6); doc.text('ADDRESS',ML+90,y+6);
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(20,20,20);
  doc.text(customer,ML+4,y+13); doc.text(address,ML+90,y+13);
  y+=24;

  let grandTotal=0, grandNA=false;
  jobs.forEach((job, idx) => {
    checkY(20);
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(50,80,160);
    doc.text('Section '+(idx+1),ML,y); y+=5; hline([100,130,220]); y+=5;
    const sc = job.scope || document.getElementById('scope-'+idx)?.value || '';
    if (sc) {
      doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
      const sl = doc.splitTextToSize('Scope: '+sc, contentW); checkY(sl.length*5+4); doc.text(sl,ML,y); y+=sl.length*5+4;
    }
    if (job.addedItems.length) {
      checkY(14); doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
      doc.text('MATERIALS FROM CATALOGUE',ML,y); y+=5; tableHeader();
      let st=0,sna=false;
      job.addedItems.forEach(item => { const l=tableRow(item); if(l!==null)st+=l; else sna=true; });
      secSubtotal(st,sna); grandTotal+=st; if(sna)grandNA=true;
    }
    if (job.tmpItems.length) {
      checkY(14); doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
      doc.text('ADDITIONAL / UNLISTED ITEMS',ML,y); y+=5; tableHeader();
      let tt=0,tna=false;
      job.tmpItems.forEach(item => { const l=tableRow(item); if(l!==null)tt+=l; else tna=true; });
      secSubtotal(tt,tna); grandTotal+=tt; if(tna)grandNA=true;
    }
    y+=4;
  });

  if (notes) {
    checkY(16); doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(60,60,60); doc.text('NOTES',ML,y); y+=5;
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
    const nl = doc.splitTextToSize(notes,contentW); checkY(nl.length*5+4); doc.text(nl,ML,y); y+=nl.length*5+8;
  }

  // Financial summary box
  checkY(55);
  const markup = grandTotal*(markupPct/100);
  const vat    = (grandTotal+markup)*(vatPct/100);
  const total  = grandTotal+markup+vat;
  const naTag  = grandNA ? ' + N/A' : '';
  doc.setFillColor(20,24,40); doc.roundedRect(ML,y,contentW,52,3,3,'F');
  const bL=ML+6, bR=PAGE_W-MR-6; let by=y+9;
  function sl(label,value,big) {
    doc.setFont('helvetica',big?'bold':'normal'); doc.setFontSize(big?10.5:9);
    doc.setTextColor(big?255:180, big?255:195, big?255:230);
    doc.text(label,bL,by); doc.text(value,bR,by,{align:'right'}); by+=big?9:7;
  }
  function sd() { doc.setDrawColor(60,65,100); doc.setLineWidth(0.3); doc.line(bL,by-1,bR,by-1); }
  sl('Subtotal (cost)',                        '$'+grandTotal.toFixed(2)+naTag);
  sl('Markup ('+markupPct+'%)',                '$'+markup.toFixed(2));
  sd(); by+=2;
  sl('VAT ('+vatPct+'% on cost + markup)',     '$'+vat.toFixed(2));
  sd(); by+=3;
  sl('TOTAL QUOTED (TTD)',                     '$'+total.toFixed(2)+naTag, true);

  drawPageNumber();
  const blob = doc.output('blob');
  const fn = 'Quotation_' + customer.replace(/[^a-zA-Z0-9]/g,'_') + '_' + dateRaw + '.pdf';
  const file = new File([blob], fn, { type:'application/pdf' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
    navigator.share({ files:[file], title:'Material Cost Sheet' }).catch(() => downloadBlob(blob,fn));
  } else { downloadBlob(blob,fn); }
}

// ─────────────────────────────────────────────
//  CSV EXPORT
// ─────────────────────────────────────────────
function exportCSV() {
  const customer  = document.getElementById('customer').value  || 'Customer';
  const address   = document.getElementById('address').value   || '';
  const dateRaw   = document.getElementById('date').value      || new Date().toISOString().split('T')[0];
  const quoteNo   = document.getElementById('quoteNo').value   || '';
  const notes     = document.getElementById('notes').value     || '';
  const markupPct = parseFloat(document.getElementById('pct-markup').value) || 0;
  const vatPct    = parseFloat(document.getElementById('pct-vat').value)    || 0;
  const esc = v => typeof v==='number' ? (isFinite(v)?v:'') : '"'+String(v).replace(/"/g,'""')+'"';
  const row = (...cols) => cols.map(esc).join(',');
  const rows = [];
  rows.push(row(COMPANY)); rows.push(row('Material Cost Sheet')); rows.push('');
  rows.push(row('Customer',customer)); rows.push(row('Address',address)); rows.push(row('Date',dateRaw));
  if (quoteNo) rows.push(row('Quote No.',quoteNo)); rows.push('');

  let grand=0, grandNA=false;
  jobs.forEach((job,idx) => {
    rows.push(row('SECTION '+(idx+1)));
    const sc = job.scope || document.getElementById('scope-'+idx)?.value || '';
    if (sc) rows.push(row('Scope',sc)); rows.push('');
    rows.push(row('MATERIALS FROM CATALOGUE'));
    rows.push(row('SKU','Qty','Unit','Description','Unit Price (TTD)','Line Total (TTD)'));
    let st=0,sna=false;
    job.addedItems.forEach(m => {
      const up=m.Price!==null&&m.Price!==undefined?m.Price:null;
      const lt=up!==null?parseFloat((up*m.Qty).toFixed(2)):'N/A';
      rows.push(row(m.SKU,m.Qty,m.Unit,m.Item,up!==null?up:'N/A',lt));
      if(lt!=='N/A')st+=lt; else sna=true;
    });
    rows.push(row('','','','','Section Subtotal',st+(sna?' + N/A':''))); grand+=st; if(sna)grandNA=true; rows.push('');
    if (job.tmpItems.length) {
      rows.push(row('ADDITIONAL / UNLISTED ITEMS'));
      rows.push(row('SKU','Qty','Unit','Description','Unit Price (TTD)','Line Total (TTD)'));
      let tt=0;
      job.tmpItems.forEach(m => { const lt=parseFloat(((m.Price||0)*m.Qty).toFixed(2)); rows.push(row(m.SKU,m.Qty,m.Unit,m.Item,m.Price||0,lt)); tt+=lt; });
      rows.push(row('','','','','Section Subtotal',tt)); grand+=tt; rows.push('');
    }
  });
  const markup=grand*(markupPct/100), vat=(grand+markup)*(vatPct/100), total=grand+markup+vat;
  const naTag=grandNA?' + N/A':'';
  rows.push(row('FINANCIAL SUMMARY'));
  rows.push(row('Subtotal (cost)',parseFloat(grand.toFixed(2))));
  rows.push(row('Markup ('+markupPct+'%)',parseFloat(markup.toFixed(2))));
  rows.push(row('VAT ('+vatPct+'% on cost+markup)',parseFloat(vat.toFixed(2))));
  rows.push(row('TOTAL QUOTED (TTD)',parseFloat(total.toFixed(2))+naTag));
  rows.push('');
  if (notes) rows.push(row('Notes',notes));
  const blob = new Blob([rows.join('\n')], { type:'text/csv;charset=utf-8;' });
  const fn = 'Costing_' + customer.replace(/[^a-zA-Z0-9]/g,'_') + '_' + dateRaw + '.csv';
  const file = new File([blob],fn,{type:'text/csv'});
  if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
    navigator.share({files:[file],title:'Material Cost Sheet CSV'}).catch(()=>downloadBlob(blob,fn));
  } else { downloadBlob(blob,fn); }
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}

function handleModalOverlayClick(e, modalId) {
  if (e.target.id === modalId) { if(modalId==='addModal')closeAddModal(); if(modalId==='qtyModal')closeQtyModal(); }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('toast-show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('toast-show'),3000);
}

document.addEventListener('keydown', e => { if(e.key==='Escape'){closeAddModal();closeQtyModal();} });
document.addEventListener('click',   e => { if(!e.target.closest('[id^="searchOther-"]')&&!e.target.closest('[id^="suggestionList-"]'))hideSuggestions(); });
